name: ICT/SMC Setup Scanner

on:
  schedule:
    # London Kill Zone: 06:00–10:00 UTC (covers GMT & BST), every 15 min, Mon–Fri
    - cron: '0,15,30,45 6,7,8,9 * * 1-5'
    # New York Kill Zone: 11:00–15:00 UTC (covers EST & EDT), every 15 min, Mon–Fri
    - cron: '0,15,30,45 11,12,13,14 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ICT Scanner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python forex_scanner.py
